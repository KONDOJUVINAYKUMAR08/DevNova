upstream frontend {
    server frontend:3000;
}

upstream user-service {
    server user-service:4001;
}

upstream product-service {
    server product-service:4002;
}

upstream rate-service {
    server rate-service:4003;
}

upstream order-service {
    server order-service:4004;
}

upstream review-service {
    server review-service:4005;
}

upstream admin-service {
    server admin-service:4006;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 10M;

    # Frontend
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js HMR (dev)
    location /_next/webpack-hmr {
        proxy_pass http://frontend/_next/webpack-hmr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # User Service
    location /api/users {
        proxy_pass http://user-service/api/users;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Product Service
    location /api/products {
        proxy_pass http://product-service/api/products;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Category Service
    location /api/categories {
        proxy_pass http://product-service/api/categories;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate Service
    location /api/rates {
        proxy_pass http://rate-service/api/rates;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Order Service
    location /api/orders {
        proxy_pass http://order-service/api/orders;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Review Service
    location /api/reviews {
        proxy_pass http://review-service/api/reviews;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Service
    location /api/admin {
        proxy_pass http://admin-service/api/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health checks
    location /health/user { proxy_pass http://user-service/health; }
    location /health/product { proxy_pass http://product-service/health; }
    location /health/rate { proxy_pass http://rate-service/health; }
    location /health/order { proxy_pass http://order-service/health; }
    location /health/review { proxy_pass http://review-service/health; }
    location /health/admin { proxy_pass http://admin-service/health; }
}
